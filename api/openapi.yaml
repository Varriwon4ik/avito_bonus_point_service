openapi: 3.0.3
info:
  title: Bonus Points Ledger Service API
  version: 0.1.0
  description: |
    HTTP API contract for the bonus points ledger service.
    The service implements accruals, balances, holds, hold confirmation,
    hold cancellation, one-shot debits, lots inspection, transaction history listing,
    a health endpoint, and OpenAPI access from the running service.
servers:
  - url: http://localhost:8080
    description: Local Docker or local-run instance
tags:
  - name: Health
  - name: Accruals
  - name: Balances
  - name: Holds
  - name: Debits
  - name: Lots
  - name: Transactions
  - name: Autotest
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics
      description: |
        Exposes request counters/latencies and ledger-level gauges in the
        Prometheus text exposition format. Unauthenticated, intended for an
        internal scraper. Implemented in US-10.
      responses:
        '200':
          description: Metrics in Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
              example: |
                # TYPE http_requests_total counter
                http_requests_total{method="GET",path="/v1/users/{id}/balance",status="200"} 5
                # TYPE http_request_duration_seconds histogram
                http_request_duration_seconds_count{method="GET",path="/v1/users/{id}/balance"} 5
                # TYPE bonus_points_available gauge
                bonus_points_available 1200
  /v1/users/{id}/accruals:
    post:
      tags: [Accruals]
      summary: Accrue bonus points for a user
      description: |
        Supports manual admin accrual and service-side accrual after purchase confirmation.
        Implemented in MVP v0.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccrualRequest'
      responses:
        '201':
          description: Points accrued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualResult'
        '400':
          description: Malformed JSON, missing required fields, invalid amount, invalid TTL value, or invalid label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate idempotency key currently in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users/{id}/balance:
    get:
      tags: [Balances]
      summary: Get current balance information
      description: Implemented in MVP v0.
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: expiring_within_days
          schema:
            type: integer
            minimum: 0
            default: 7
          description: Number of days for the expiring-soon calculation
      responses:
        '200':
          description: Balance returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResult'
        '400':
          description: Invalid `expiring_within_days` value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users/{id}/lots:
    get:
      tags: [Lots]
      summary: List the user's points lots
      description: Lists the user's point lots ordered by soonest expiry first using page/offset pagination, with an optional support-facing status filter.
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
          description: 1-based page number
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 20
            example: 20
          description: Number of lots per page
        - in: query
          name: status
          schema:
            type: string
            enum: [active, expired, exhausted]
            example: active
          description: Optional lot-status filter. `active` returns non-expired lots with remaining points, `expired` returns lots whose expiry has passed, and `exhausted` returns non-expired lots with zero remaining points.
      responses:
        '200':
          description: Lots returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLots'
        '400':
          description: Invalid `page`, `offset`, or `status` value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users/{id}/transactions:
    get:
      tags: [Transactions]
      summary: List the user's transaction history
      description: Lists the user's ledger entries newest-first using page/offset pagination.
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
          description: 1-based page number
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 20
            example: 20
          description: Number of entries per page
      responses:
        '200':
          description: Transaction history returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLedger'
        '400':
          description: Invalid `page` or `offset` value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users/{id}/holds:
    post:
      tags: [Holds]
      summary: Create a hold for the user's points
      description: Implemented in MVP v0.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '201':
          description: Hold created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldResult'
        '400':
          description: Malformed JSON, missing required fields, or invalid amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient available points or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/holds/{hold_id}/confirm:
    post:
      tags: [Holds]
      summary: Confirm an existing hold
      description: Implemented in MVP v0.
      parameters:
        - $ref: '#/components/parameters/HoldId'
      responses:
        '200':
          description: Hold confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldResult'
        '400':
          description: Invalid hold ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Hold not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Hold is not in an active status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/holds/{hold_id}/cancel:
    post:
      tags: [Holds]
      summary: Cancel an existing hold
      description: |
        Implemented in MVP v0. Holds are also auto-released the same way by a
        background sweep if they are left active/unresolved for longer than
        the HOLD_TIMEOUT_HOURS setting; those auto-released holds carry a
        "auto-released: timeout" note on their ledger entry.
      parameters:
        - $ref: '#/components/parameters/HoldId'
      responses:
        '200':
          description: Hold cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldResult'
        '400':
          description: Invalid hold ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Hold not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Hold is not in an active status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users/{id}/debits:
    post:
      tags: [Debits]
      summary: Perform a one-shot debit
      description: Implemented in MVP v0 as hold plus confirm in one transaction.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Debit completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebitResult'
        '400':
          description: Malformed JSON, missing required fields, or invalid amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient available points or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/autotest/run:
    post:
      tags: [Autotest]
      summary: Run the built-in accrual autotester (US-15/US-17)
      description: |
        Runs the shared autotester engine against this live instance and returns
        a per-check pass/fail report. It exercises accrual correctness and a burst
        of parallel accrual requests, asserting each produces a distinct lot with a
        consistent balance and ledger. All requests target a dedicated
        `autotest-`-prefixed test user, so real accounts are never touched. This
        backs the web "Autotester" tab and mirrors the `cmd/autotest` console tool.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutotestRunRequest'
      responses:
        '200':
          description: The autotester ran; inspect `passed` and per-check `results`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutotestRunResult'
        '400':
          description: Malformed JSON, missing amount, or an invalid scenario value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: The target instance was unreachable or an internal error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: User identifier
    HoldId:
      in: path
      name: hold_id
      required: true
      schema:
        type: integer
        minimum: 1
      description: Hold identifier
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    AccrualRequest:
      type: object
      required: [amount, idempotency_key]
      additionalProperties: false
      properties:
        amount:
          type: integer
          minimum: 1
          example: 500
        ttl_days:
          type: integer
          minimum: 1
          example: 180
        idempotency_key:
          type: string
          minLength: 1
          example: order_12345
        label:
          type: string
          maxLength: 32
          description: Optional transaction label. The backend trims it, accepts predefined labels such as `test` and `real`, and rejects control or unsafe characters.
          example: test
    AmountRequest:
      type: object
      required: [amount, idempotency_key]
      additionalProperties: false
      properties:
        amount:
          type: integer
          minimum: 1
          example: 200
        idempotency_key:
          type: string
          minLength: 1
          example: checkout_98765
    AccrualResult:
      type: object
      required: [lot_id, user_id, amount, expires_at]
      properties:
        lot_id:
          type: integer
          example: 1
        user_id:
          type: string
          example: user_123
        amount:
          type: integer
          example: 500
        expires_at:
          type: string
          format: date-time
    BalanceResult:
      type: object
      required: [user_id, available, held, total, expiring_soon]
      properties:
        user_id:
          type: string
          example: user_123
        available:
          type: integer
          example: 1200
        held:
          type: integer
          example: 300
        total:
          type: integer
          example: 1500
        expiring_soon:
          type: integer
          example: 80
    HoldResult:
      type: object
      required: [hold_id, user_id, amount, status]
      properties:
        hold_id:
          type: integer
          example: 42
        user_id:
          type: string
          example: user_123
        amount:
          type: integer
          example: 200
        status:
          type: string
          enum: [active, confirmed, cancelled]
          example: active
    DebitResult:
      type: object
      required: [hold_id, user_id, amount, status]
      properties:
        hold_id:
          type: integer
          example: 43
        user_id:
          type: string
          example: user_123
        amount:
          type: integer
          example: 100
        status:
          type: string
          enum: [confirmed]
          example: confirmed
    LotInfo:
      type: object
      required: [lot_id, user_id, amount, remaining, status, expires_at, created_at]
      properties:
        lot_id:
          type: integer
          example: 1
        user_id:
          type: string
          example: user_123
        amount:
          type: integer
          example: 500
        remaining:
          type: integer
          example: 300
        status:
          type: string
          enum: [active, expired, exhausted]
          example: active
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    PaginatedLots:
      type: object
      required: [user_id, page, offset, total, lots]
      properties:
        user_id:
          type: string
          example: user_123
        page:
          type: integer
          minimum: 1
          example: 1
        offset:
          type: integer
          minimum: 1
          maximum: 500
          example: 20
        total:
          type: integer
          minimum: 0
          example: 42
        lots:
          type: array
          items:
            $ref: '#/components/schemas/LotInfo'
    LedgerEntry:
      type: object
      required: [id, user_id, type, amount, created_at]
      properties:
        id:
          type: integer
          example: 10
        user_id:
          type: string
          example: user_123
        type:
          type: string
          example: accrual
        amount:
          type: integer
          example: 500
        ref_type:
          type: string
          nullable: true
          example: lot
        ref_id:
          type: integer
          nullable: true
          example: 1
        label:
          type: string
          nullable: true
          description: Optional user-facing transaction label such as `test`, `real`, or a custom short label.
          example: test
        note:
          type: string
          nullable: true
          description: Optional service note used for internal/system annotations such as automatic hold release.
          example: auto-released: timeout
        created_at:
          type: string
          format: date-time
    AutotestRunRequest:
      type: object
      required: [amount]
      additionalProperties: false
      properties:
        label:
          type: string
          description: Scenario label; free text is slugified. Defaults to `demo`.
          example: demo
        user_id:
          type: string
          description: >
            Test user; an `autotest-` prefix is enforced and the value is slugified.
            Defaults to `autotest-demo-user`.
          example: demo-user
        amount:
          type: integer
          minimum: 1
          example: 100
        ttl_days:
          type: integer
          minimum: 1
          description: Optional accrual lifetime; defaults to the server's configured TTL.
          example: 365
        parallel_requests:
          type: integer
          minimum: 2
          description: Number of simultaneous accruals for the parallel check. Defaults to 5.
          example: 5
    AutotestCheckResult:
      type: object
      required: [name, passed]
      properties:
        name:
          type: string
          example: parallel accrual
        passed:
          type: boolean
          example: true
        message:
          type: string
          description: Failure detail; omitted when the check passed.
          example: parallel request 3 reused lot id 41
    AutotestRunResult:
      type: object
      required: [scenario, passed, results]
      properties:
        scenario:
          $ref: '#/components/schemas/AutotestScenario'
        passed:
          type: boolean
          description: True only when every check passed.
          example: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/AutotestCheckResult'
    AutotestScenario:
      type: object
      required: [label, user_id, amount, ttl_days, parallel_requests, ledger_label]
      properties:
        label:
          type: string
          example: demo
        user_id:
          type: string
          example: autotest-demo-user
        amount:
          type: integer
          example: 100
        ttl_days:
          type: integer
          example: 365
        parallel_requests:
          type: integer
          example: 5
        ledger_label:
          type: string
          example: test
    PaginatedLedger:
      type: object
      required: [user_id, page, offset, total, entries]
      properties:
        user_id:
          type: string
          example: user_123
        page:
          type: integer
          minimum: 1
          example: 1
        offset:
          type: integer
          minimum: 1
          maximum: 500
          example: 20
        total:
          type: integer
          minimum: 0
          example: 42
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntry'
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: bad_request
        message:
          type: string
          example: amount must be a positive integer
