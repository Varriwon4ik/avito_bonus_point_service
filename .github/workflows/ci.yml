name: CI

# Continuous integration gate (US-14). Builds the service, runs the full test
# suite (incl. automated quality requirement tests), enforces per-module line
# coverage, and scans dependencies for known vulnerabilities on every push and
# every pull request to main, so regressions are caught before merge and main
# always stays in a releasable state.
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a fresh push supersedes the
# in-flight build for that branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Integration and quality requirement tests run against a real Postgres
    # instance. The credentials and image match docker-compose.yml so local and
    # CI runs are identical.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bonus
          POSTGRES_PASSWORD: bonus
          POSTGRES_DB: bonus_ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bonus"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    env:
      # Consumed by the integration / QRT tests (newTestEnv). Without it those
      # tests self-skip, so it is required for the suite to be a real gate.
      TEST_DATABASE_URL: postgres://bonus:bonus@localhost:5432/bonus_ledger?sslmode=disable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pin the toolchain to the version declared in go.mod (go 1.22) so the
      # CI build is reproducible and tracks the team's standard toolchain.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module dependencies
        run: go mod verify

      - name: Check formatting (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Run the automated quality requirement tests on their own first so their
      # result and timings are independently inspectable in the CI log.
      # QRT-001 (QR-001 Time behaviour) and QRT-002 (QR-002 Integrity).
      - name: Quality requirement tests (QRT-001, QRT-002)
        run: go test ./internal/api/ -race -count=1 -run 'TestQRT' -v

      # -p 1 runs the package test binaries one at a time. The integration
      # tests share a single Postgres database (they each run migrations and
      # TRUNCATE the same tables), so running packages in parallel would race
      # on schema creation and wipe each other's rows. -race surfaces data
      # races and -count=1 disables the test cache so the gate always re-runs.
      # -coverpkg=./... attributes coverage of every product package to the
      # whole suite (so e.g. internal/data coverage includes exercise via the
      # internal/api integration tests).
      - name: Test with coverage
        run: go test ./... -race -count=1 -p 1 -coverpkg=./... -coverprofile=coverage.out

      - name: Coverage summary (total)
        run: go tool cover -func=coverage.out | tail -n 1

      # QRT-003 (QR-003 Testability): each critical module must keep >=30% line
      # coverage or the build fails.
      - name: Per-module coverage gate (QRT-003)
        run: bash scripts/coverage_gate.sh coverage.out

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

  govulncheck:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    # Additional QA check (distinct from lint/format/vet, build, unit/
    # integration tests, coverage, the QRTs and the Lychee link check):
    # static dependency + stdlib vulnerability analysis against the Go vuln DB.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...
