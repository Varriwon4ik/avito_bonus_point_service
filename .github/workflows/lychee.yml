name: Lychee Link Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-file .lycheeignore "./**/*.md"
          fail: true
          # Authenticate GitHub requests so release/compare URLs are not
          # rate-limited to spurious 404s on anonymous CI runs.
          token: ${{ secrets.GITHUB_TOKEN }}
